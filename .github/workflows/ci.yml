name: CI — Lint & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      # ---- Checkout ----
      - name: Checkout code
        uses: actions/checkout@v4

      # ---- Python setup ----
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('service/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r service/requirements.txt
          pip install pytest flake8 black

      # ---- Lint ----
      - name: Run flake8
        run: flake8 service/ model/ tests/ --max-line-length=120 --exclude=__pycache__

      - name: Check formatting with black
        run: black --check service/ model/ tests/ --line-length=120

      # ---- Train model (needed for tests) ----
      - name: Train model
        run: python model/train.py

      # ---- Test ----
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short --junitxml=reports/test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: reports/test-results.xml

      # ---- Docker build validation ----
      - name: Validate Docker build
        run: docker build -t zero-touch-ml:ci-test .
